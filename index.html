<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050814">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ほしぞらさんぽ">
<meta name="description" content="こどもとおとなのWebプラネタリウム。実際の日時・場所の星空と星座のおはなし。">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="apple-touch-icon" href="icon-180.png">
<title>ほしぞらさんぽ — Webプラネタリウム</title>
<style>
  /* ============ tokens (planetarium: deliberate single dark theme) ============ */
  :root{
    --sky-zenith:#050814;
    --sky-horizon:#0d1731;
    --ink:#e8ecf7;
    --ink-dim:#9aa5c4;
    --gold:#f0c86e;
    --line:#7fd4e8;
    --panel:rgba(11,16,34,.88);
    --panel-edge:rgba(127,212,232,.22);
    --serif:"Hiragino Mincho ProN","Yu Mincho","BIZ UDMincho","MS PMincho",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  }
  html,body{height:100%;background:#050814;}
  #app{position:fixed;inset:0;overflow:hidden;font-family:var(--sans);color:var(--ink);
       -webkit-user-select:none;user-select:none;background:#050814;}
  #sky{position:absolute;inset:0;touch-action:none;cursor:grab;}
  #sky.drag{cursor:grabbing;}

  /* ---- header plate ---- */
  #plate{position:absolute;top:12px;left:14px;pointer-events:none;z-index:5;
         text-shadow:0 1px 8px rgba(0,0,0,.8);}
  #plate h1{font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:.14em;
            color:var(--gold);margin:0;}
  #plate .sub{font-size:11.5px;color:var(--ink-dim);margin-top:3px;letter-spacing:.05em;
              font-variant-numeric:tabular-nums;}
  #plate .sub b{color:var(--ink);font-weight:600;}

  #helpBtn{position:absolute;top:12px;right:14px;z-index:6;width:34px;height:34px;border-radius:50%;
           border:1px solid var(--panel-edge);background:var(--panel);color:var(--ink-dim);
           font-size:16px;font-family:var(--serif);cursor:pointer;}
  #helpBtn:focus-visible{outline:2px solid var(--gold);}

  /* ---- quiz bar ---- */
  #quizBar{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:6;display:none;
           background:var(--panel);border:1px solid var(--gold);border-radius:999px;
           padding:9px 18px;font-size:14px;white-space:nowrap;max-width:92vw;overflow:hidden;
           text-overflow:ellipsis;box-shadow:0 4px 24px rgba(0,0,0,.5);}
  #quizBar b{color:var(--gold);font-family:var(--serif);font-size:15px;}
  #quizBar .qn{color:var(--ink-dim);font-size:12px;margin-right:8px;font-variant-numeric:tabular-nums;}

  /* ---- dock ---- */
  #dock{position:absolute;left:0;right:0;bottom:0;z-index:6;display:flex;gap:8px;
        padding:10px 12px calc(10px + env(safe-area-inset-bottom));overflow-x:auto;
        -webkit-overflow-scrolling:touch;scrollbar-width:none;
        background:linear-gradient(to top, rgba(4,6,15,.92), rgba(4,6,15,0));}
  #dock::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;border:1px solid var(--panel-edge);background:var(--panel);color:var(--ink);
        border-radius:999px;padding:9px 15px;font-size:13px;font-family:var(--sans);cursor:pointer;
        letter-spacing:.03em;line-height:1;transition:border-color .15s, color .15s;}
  .pill.on{border-color:var(--gold);color:var(--gold);}
  .pill:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* ---- time panel ---- */
  #timePanel{position:absolute;left:50%;transform:translateX(-50%);bottom:64px;z-index:6;display:none;
             width:min(480px, calc(100vw - 24px));background:var(--panel);
             border:1px solid var(--panel-edge);border-radius:16px;padding:14px 16px;
             box-shadow:0 8px 32px rgba(0,0,0,.55);}
  #timePanel.open{display:block;}
  #tpNow{font-family:var(--serif);font-size:17px;color:var(--gold);text-align:center;
         letter-spacing:.06em;font-variant-numeric:tabular-nums;}
  #tpSlider{width:100%;margin:12px 0 4px;accent-color:var(--gold);}
  #tpHint{font-size:10.5px;color:var(--ink-dim);text-align:center;margin-bottom:10px;}
  .tpRow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .tbtn{border:1px solid var(--panel-edge);background:transparent;color:var(--ink);
        border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;}
  .tbtn.gold{border-color:var(--gold);color:var(--gold);}
  .tbtn:focus-visible{outline:2px solid var(--gold);}

  /* ---- info sheet ---- */
  #sheet{position:absolute;left:50%;transform:translate(-50%,105%);bottom:0;z-index:7;
         width:min(560px,100vw);max-height:62vh;overflow-y:auto;
         background:var(--panel);backdrop-filter:blur(10px);
         border:1px solid var(--panel-edge);border-bottom:none;border-radius:20px 20px 0 0;
         padding:18px 22px calc(20px + env(safe-area-inset-bottom));
         transition:transform .28s cubic-bezier(.3,1,.4,1);box-shadow:0 -8px 40px rgba(0,0,0,.6);}
  #sheet.open{transform:translate(-50%,0);}
  @media (prefers-reduced-motion:reduce){#sheet{transition:none;}}
  #sheetClose{position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;
              border:none;background:rgba(255,255,255,.08);color:var(--ink-dim);font-size:15px;cursor:pointer;}
  .sh-kana{font-size:11px;color:var(--ink-dim);letter-spacing:.35em;}
  .sh-name{font-family:var(--serif);font-size:26px;color:var(--gold);letter-spacing:.1em;
           margin:2px 0 2px;font-weight:600;text-wrap:balance;}
  .sh-en{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--ink-dim);}
  .sh-chips{display:flex;gap:6px;margin:10px 0 4px;flex-wrap:wrap;}
  .chip{font-size:10.5px;padding:3px 10px;border-radius:999px;border:1px solid var(--panel-edge);
        color:var(--ink-dim);letter-spacing:.06em;}
  .chip.season{border-color:rgba(240,200,110,.5);color:var(--gold);}
  .chip.up{border-color:rgba(140,230,170,.5);color:#9fe6b8;}
  .sh-story{font-size:14px;line-height:2;margin-top:10px;font-family:var(--serif);}
  .sh-story.kids{font-size:16px;line-height:2.15;font-family:var(--sans);}
  .sh-fun{margin-top:12px;padding:11px 13px;border-left:2px solid var(--gold);
          background:rgba(240,200,110,.06);font-size:12.5px;line-height:1.9;color:#e6d9b8;border-radius:0 8px 8px 0;}
  .sh-fun b{color:var(--gold);font-family:var(--serif);letter-spacing:.1em;}
  .sh-stars{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .star-chip{display:flex;align-items:center;gap:7px;border:1px solid var(--panel-edge);
             border-radius:10px;padding:7px 11px;font-size:11.5px;color:var(--ink);}
  .star-chip .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;}
  .star-chip small{color:var(--ink-dim);font-variant-numeric:tabular-nums;}
  .tempbar{margin-top:14px;}
  .tempbar .bar{position:relative;height:10px;border-radius:5px;
    background:linear-gradient(90deg,#8fb0ff,#dfe6ff,#fff6e0,#ffc98a,#ff8a5c);}
  .tempbar .mk{position:absolute;top:-4px;width:4px;height:18px;background:#fff;border-radius:2px;
               box-shadow:0 0 6px #fff;transform:translateX(-50%);}
  .tempbar .lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-dim);margin-top:5px;}

  /* ---- help overlay ---- */
  #help{position:absolute;inset:0;z-index:9;background:rgba(3,5,12,.78);display:none;
        align-items:center;justify-content:center;padding:20px;}
  #help.open{display:flex;}
  #helpCard{max-width:400px;background:var(--panel);border:1px solid var(--panel-edge);
            border-radius:20px;padding:26px 26px 22px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.7);}
  #helpCard h2{font-family:var(--serif);color:var(--gold);letter-spacing:.2em;font-size:20px;
               margin:0 0 4px;font-weight:600;}
  #helpCard .tag{font-size:10.5px;color:var(--ink-dim);letter-spacing:.3em;}
  #helpCard ul{list-style:none;padding:0;margin:18px 0;text-align:left;display:grid;gap:11px;}
  #helpCard li{font-size:13px;line-height:1.7;display:flex;gap:12px;align-items:baseline;}
  #helpCard li .k{flex:0 0 74px;color:var(--gold);font-family:var(--serif);font-size:12.5px;
                  letter-spacing:.08em;text-align:right;}
  #helpStart{margin-top:4px;border:1px solid var(--gold);background:rgba(240,200,110,.12);
             color:var(--gold);border-radius:999px;padding:11px 34px;font-size:14px;
             font-family:var(--serif);letter-spacing:.25em;cursor:pointer;}

  /* ---- toast ---- */
  #toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:8;
         background:var(--panel);border:1px solid var(--panel-edge);border-radius:12px;
         padding:10px 18px;font-size:12.5px;opacity:0;transition:opacity .3s;pointer-events:none;
         max-width:88vw;text-align:center;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  #toast.show{opacity:1;}

  @media (max-width:420px){
    #plate h1{font-size:17px;}
    .sh-name{font-size:22px;}
  }
</style>
</head>
<body style="margin:0">
<div id="app">
  <canvas id="sky"></canvas>

  <div id="plate">
    <h1>ほしぞらさんぽ</h1>
    <div class="sub"><b id="pTime">--</b><br><span id="pLoc">東京</span>の空 ・ <span id="pDir">南</span>を向いています</div>
  </div>
  <button id="helpBtn" aria-label="つかいかた">?</button>

  <div id="quizBar"><span class="qn" id="qNum"></span><span id="qText"></span></div>

  <div id="timePanel">
    <div id="tpNow">--</div>
    <input id="tpSlider" type="range" min="-720" max="720" step="10" value="0" aria-label="時間を動かす">
    <div id="tpHint">← 12時間まえ　｜　スライダーで時間たび　｜　12時間あと →</div>
    <div class="tpRow">
      <button class="tbtn" data-d="-30">−1ヶ月</button>
      <button class="tbtn" data-d="-1">−1日</button>
      <button class="tbtn gold" id="tpNowBtn">いまに戻る</button>
      <button class="tbtn" data-d="1">＋1日</button>
      <button class="tbtn" data-d="30">＋1ヶ月</button>
      <button class="tbtn" id="tpPlay">▶ 早送り</button>
    </div>
  </div>

  <nav id="dock">
    <button class="pill on" id="bLines">星座線</button>
    <button class="pill on" id="bNames">名まえ</button>
    <button class="pill" id="bAst">大三角</button>
    <button class="pill" id="bTime">時間たび</button>
    <button class="pill" id="bLoc">場所: 東京</button>
    <button class="pill" id="bQuiz">クイズ</button>
    <button class="pill" id="bKids">ひらがなモード</button>
  </nav>

  <section id="sheet" aria-live="polite">
    <button id="sheetClose" aria-label="とじる">✕</button>
    <div id="sheetBody"></div>
  </section>

  <div id="help">
    <div id="helpCard">
      <h2>ほしぞらさんぽ</h2>
      <div class="tag">WEB PLANETARIUM</div>
      <ul>
        <li><span class="k">ドラッグ</span><span>空を見まわす（スマホは指でスワイプ）</span></li>
        <li><span class="k">ピンチ / ホイール</span><span>ズームイン・ズームアウト</span></li>
        <li><span class="k">星座をタップ</span><span>星座の由来やお話がひらくよ</span></li>
        <li><span class="k">時間たび</span><span>時間をうごかすと、星と太陽がうごく！</span></li>
        <li><span class="k">場所</span><span>シドニーに行くと南十字星がみえる</span></li>
      </ul>
      <button id="helpStart">はじめる</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>

   星データ: 主要恒星の J2000 赤経(時)・赤緯(度)・実視等級・B-V。
   教育用プロトタイプにつき、暗い星の一部座標は近似。
   ================================================================= */
const DEG = Math.PI/180, TAU = Math.PI*2;
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
const lerp  = (a,b,t)=>a+(b-a)*t;
const smooth= (a,b,x)=>{const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);};

/* ---------------- constellation catalog ----------------
   ss: [ra(h), dec(deg), mag, bv, name?, 光年?, flag?]  flag: 'cl'=星団 'neb'=散開ぼんやり */

{id:'lib',jp:'てんびん座',kana:'てんびん',en:'Libra',season:'初夏',

    mag:s[2], bv:(s[3]==null?0.3:s[3]), name:s[4]||'', ly:s[5]||0, con, conName:conName||'',

/* ---------------- astronomy ---------------- */
function jd(ms){ return ms/86400000 + 2440587.5; }
function gmstHours(ms){
  let g = 18.697374558 + 24.06570982441908*(jd(ms)-2451545.0);
  g%=24; if(g<0)g+=24; return g;
}
function sunRaDec(ms){
  const n = jd(ms)-2451545.0;
  let L=(280.460+0.9856474*n)%360, g=((357.528+0.9856003*n)%360)*DEG;
  const lam=(L+1.915*Math.sin(g)+0.020*Math.sin(2*g))*DEG, eps=23.439*DEG;
  return {ra:Math.atan2(Math.cos(eps)*Math.sin(lam),Math.cos(lam)),
          dec:Math.asin(Math.sin(eps)*Math.sin(lam))};
}
/* alt/az from ra/dec trig parts. H = lst - ra */
function altAz(sinD,cosD,raRad,lstRad,sinLat,cosLat){
  const H=lstRad-raRad, cosH=Math.cos(H), sinH=Math.sin(H);
  const alt=Math.asin(sinD*sinLat + cosD*cosLat*cosH);
  const az=Math.atan2(-cosD*sinH, sinD*cosLat - cosD*cosH*sinLat);
  return [alt, az];
}

/* ---------------- canvas ---------------- */
const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

function bvColor(bv){
  if(bv<-0.05) return '#a8c0ff';
  if(bv<0.2)  return '#d8e2ff';
  if(bv<0.5)  return '#f6f4ff';
  if(bv<0.9)  return '#fff2da';
  if(bv<1.4)  return '#ffd9a4';
  return '#ff9d68';
}
function focal(){ return H/(4*Math.tan(fov*DEG/4)); }

/* project alt/az -> screen. returns [x,y,cosc] */
function project(alt,az,f,sinA0,cosA0){
  const dA=az-az0, cA=Math.cos(alt), sA=Math.sin(alt), cd=Math.cos(dA);
  const cosc=sinA0*sA + cosA0*cA*cd;
  if(cosc<-0.2) return null;
  const k=2*f/(1+cosc);
  return [W/2 + k*cA*Math.sin(dA), H/2 - k*(sA*cosA0 - cA*cd*sinA0), cosc];
}

/* ---------------- render ---------------- */
function render(now){
  const simMs=Date.now()+offsetMs;
  const lstRad=((gmstHours(simMs)+loc.lon/15)%24)*15*DEG;
  const sinLat=Math.sin(loc.lat*DEG), cosLat=Math.cos(loc.lat*DEG);
  const f=focal(), sinA0=Math.sin(alt0), cosA0=Math.cos(alt0);

  // sun
  const sun=sunRaDec(simMs);
  const [sAlt,sAz]=altAz(Math.sin(sun.dec),Math.cos(sun.dec),sun.ra,lstRad,sinLat,cosLat);
  const sAltD=sAlt/DEG;
  const dayF=smooth(-9,5,sAltD);           // 0 night → 1 day
  const starF=1-smooth(-9,-1,sAltD);       // star visibility

  // sky gradient
  const zen=mixc([5,8,20],[96,160,215],dayF), hor=mixc([13,23,49],[168,205,235],dayF);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgb(${zen})`); g.addColorStop(1,`rgb(${hor})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // twilight glow around sun direction
  if(sAltD>-14 && sAltD<8){
    const p=project(Math.max(sAlt,0),sAz,f,sinA0,cosA0);
    if(p){
      const glow=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],H*0.75);
      const a=0.5*(1-Math.abs(sAltD)/14)*(1-dayF*0.4);
      glow.addColorStop(0,`rgba(255,150,80,${a})`); glow.addColorStop(1,'rgba(255,150,80,0)');
      ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
    }
  }

  // milky way
  if(starF>0.05){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    for(const m of MW){
      const [a,z]=altAz(Math.sin(m[1]*DEG),Math.cos(m[1]*DEG),m[0]*15*DEG,lstRad,sinLat,cosLat);
      if(a<-0.05) continue;
      const p=project(a,z,f,sinA0,cosA0); if(!p||p[2]<0.05) continue;
      const r=m[2]*DEG*f*1.35;
      const mg=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r);
      mg.addColorStop(0,`rgba(200,214,255,${0.055*m[3]*starF})`);
      mg.addColorStop(1,'rgba(200,214,255,0)');
      ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(p[0],p[1],r,0,TAU); ctx.fill();
    }
    ctx.restore();
  }

  // compute star positions
  for(const s of stars){
    const [a,z]=altAz(s.sinD,s.cosD,s.raRad,lstRad,sinLat,cosLat);
    s.alt=a;
    if(a<-0.02){ s.vis=false; continue; }
    const p=project(a,z,f,sinA0,cosA0);
    if(!p||p[0]<-60||p[0]>W+60||p[1]<-60||p[1]>H+60){ s.vis=false; continue; }
    s.vis=true; s.sx=p[0]; s.sy=p[1];
  }

  // DSO
  if(starF>0.1){
    for(const d of DSO){
      const [a,z]=altAz(Math.sin(d.dec*DEG),Math.cos(d.dec*DEG),d.ra*15*DEG,lstRad,sinLat,cosLat);
      if(a<0) continue; const p=project(a,z,f,sinA0,cosA0); if(!p) continue;
      const r=d.r*DEG*f;
      ctx.save(); ctx.translate(p[0],p[1]); ctx.rotate(d.tilt); ctx.scale(1,0.45);
      const dg=ctx.createRadialGradient(0,0,0,0,0,r);
      dg.addColorStop(0,`rgba(224,225,255,${0.35*starF})`); dg.addColorStop(1,'rgba(224,225,255,0)');
      ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill(); ctx.restore();
      if(showNames && fov<70 && !quiz){
        ctx.fillStyle=`rgba(154,165,196,${0.8*starF})`; ctx.font='10px '+FONT_S;
        ctx.textAlign='left'; ctx.fillText(d.name, p[0]+r*0.5+4, p[1]-4);
      }
    }
  }

  // constellation lines
  if(showLines && starF>0.05){
    for(const c of CONS){
      const hot=(selected===c)||(quiz&&quiz.reveal===c);
      ctx.strokeStyle=hot?`rgba(240,200,110,${0.9*starF})`:`rgba(127,212,232,${0.32*starF})`;
      ctx.lineWidth=hot?1.8:1;
      ctx.beginPath();
      for(const [a,b] of c.ln){
        const s1=stars[c.idx[a]], s2=stars[c.idx[b]];
        if(!s1.vis&&!s2.vis) continue;
        if(!s1.vis||!s2.vis) continue;
        ctx.moveTo(s1.sx,s1.sy); ctx.lineTo(s2.sx,s2.sy);
      }
      ctx.stroke();
    }
  }

  // asterisms
  if(showAster && starF>0.05){
    ctx.save(); ctx.setLineDash([6,6]);
    ctx.strokeStyle=`rgba(240,200,110,${0.65*starF})`; ctx.lineWidth=1.4;
    for(const a of ASTER){
      const ps=a.pts.map(pt=>{
        const [al,z]=altAz(Math.sin(pt[1]*DEG),Math.cos(pt[1]*DEG),pt[0]*15*DEG,lstRad,sinLat,cosLat);
        return al>-0.05?project(al,z,f,sinA0,cosA0):null;
      });
      if(ps.some(p=>!p||p[2]<0.05)) continue;
      ctx.beginPath(); ctx.moveTo(ps[0][0],ps[0][1]);
      for(let i=1;i<ps.length;i++) ctx.lineTo(ps[i][0],ps[i][1]);
      if(a.close) ctx.closePath();
      ctx.stroke();
      const cx=ps.reduce((s,p)=>s+p[0],0)/ps.length, cy=ps.reduce((s,p)=>s+p[1],0)/ps.length;
      ctx.fillStyle=`rgba(240,200,110,${0.85*starF})`;
      ctx.font='12px '+FONT_M; ctx.textAlign='center'; ctx.fillText(a.name,cx,cy);
    }
    ctx.restore();
  }

  // stars
  const limitMag=4.9+(78-fov)*0.035;
  const t=now*0.001;
  for(const s of stars){
    if(!s.vis) continue;
    if(s.mag>limitMag) continue;
    let alpha=starF*clamp(1.25-(s.mag/limitMag),0.12,1);
    if(alpha<=0.01) continue;
    let r=Math.max(0.6,(3.9-s.mag*0.68))*(0.82+f/H*0.35);
    if(!reduceMotion && s.mag<2.4) alpha*=0.82+0.18*Math.sin(t*(2.2+s.bv)+s.twk);
    const col=bvColor(s.bv);
    if(s.flag==='cl'){ drawCluster(s,col,alpha); }
    else if(s.flag==='neb'){ drawNeb(s,alpha); }
    else{
      if(s.mag<1.0){
        const gg=ctx.createRadialGradient(s.sx,s.sy,0,s.sx,s.sy,r*4.5);
        gg.addColorStop(0,hexA(col,alpha*0.5)); gg.addColorStop(1,hexA(col,0));
        ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(s.sx,s.sy,r*4.5,0,TAU); ctx.fill();
      }
      ctx.fillStyle=hexA(col,alpha);
      ctx.beginPath(); ctx.arc(s.sx,s.sy,r,0,TAU); ctx.fill();
    }
  }

  // labels
  if(starF>0.05 && !quiz){
    if(showNames){
      // constellation names
      ctx.font=(kids?'15px ':'13px ')+FONT_M; ctx.textAlign='center';
      for(const c of CONS){
        let sx=0,sy=0,n=0;
        for(const i of c.idx){ const s=stars[i]; if(s.vis){sx+=s.sx;sy+=s.sy;n++;} }
        if(n<Math.max(2,c.idx.length*0.4)) continue;
        const hot=selected===c;
        ctx.fillStyle=hot?`rgba(240,200,110,${0.95*starF})`:`rgba(240,200,110,${0.62*starF})`;
        ctx.fillText(kids?c.kana+'ざ':c.jp, sx/n, sy/n - 10);
      }
      // bright star names when zoomed
      if(fov<62){
        ctx.font='10.5px '+FONT_S; ctx.textAlign='left';
        for(const s of stars){
          if(!s.vis||!s.name||s.mag>2.3) continue;
          ctx.fillStyle=`rgba(232,236,247,${0.6*starF})`;
          ctx.fillText(s.name.split('（')[0], s.sx+7, s.sy+3);
        }
      }
    }
  }

  // sun disc
  if(sAlt>-6*DEG){
    const p=project(sAlt,sAz,f,sinA0,cosA0);
    if(p){
      const r=Math.max(9,0.53*DEG*f*2);
      const sg=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r*5);
      sg.addColorStop(0,'rgba(255,244,214,0.95)'); sg.addColorStop(0.25,'rgba(255,220,140,0.5)');
      sg.addColorStop(1,'rgba(255,220,140,0)');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(p[0],p[1],r*5,0,TAU); ctx.fill();
      ctx.fillStyle='#fff6dc'; ctx.beginPath(); ctx.arc(p[0],p[1],r,0,TAU); ctx.fill();
      if(showNames){ ctx.fillStyle='rgba(90,70,20,0.85)'; ctx.font='11px '+FONT_S;
        ctx.textAlign='center'; ctx.fillText(kids?'たいよう':'太陽', p[0], p[1]+r+16); }
    }
  }

  drawHorizon(f,sinA0,cosA0,dayF);
  if(!reduceMotion) drawMeteors(now,starF);
  drawFlash(now);

  // HUD text
  updHud(simMs);
  requestAnimationFrame(render);
}
function mixc(a,b,t){ return `${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))}`; }
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${clamp(a,0,1)})`;
}
const FONT_M='"Hiragino Mincho ProN","Yu Mincho",serif';
const FONT_S='"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';

const CLOFF=[[0,0],[.42,.16],[-.38,.22],[.16,-.34],[-.22,-.28],[.5,-.12],[-.05,.42]];
function drawCluster(s,col,alpha){
  const f=focal(), sc=0.35*DEG*f;
  const gg=ctx.createRadialGradient(s.sx,s.sy,0,s.sx,s.sy,sc*2.6);
  gg.addColorStop(0,`rgba(170,200,255,${alpha*0.3})`); gg.addColorStop(1,'rgba(170,200,255,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(s.sx,s.sy,sc*2.6,0,TAU); ctx.fill();
  ctx.fillStyle=hexA('#d8e2ff',alpha);
  for(const o of CLOFF){ ctx.beginPath(); ctx.arc(s.sx+o[0]*sc,s.sy+o[1]*sc,1.3,0,TAU); ctx.fill(); }
}
function drawNeb(s,alpha){
  const r=0.6*DEG*focal();
  const gg=ctx.createRadialGradient(s.sx,s.sy,0,s.sx,s.sy,r);
  gg.addColorStop(0,`rgba(220,228,255,${alpha*0.4})`); gg.addColorStop(1,'rgba(220,228,255,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(s.sx,s.sy,r,0,TAU); ctx.fill();
}

function drawHorizon(f,sinA0,cosA0,dayF){
  // glowing horizon line
  ctx.save();
  ctx.strokeStyle=`rgba(127,212,232,${lerp(0.4,0.15,dayF)})`;
  ctx.lineWidth=1.5; ctx.shadowColor='rgba(127,212,232,0.6)'; ctx.shadowBlur=10;
  ctx.beginPath(); let pen=false;
  for(let a=0;a<=360;a+=2){
    const p=project(0,a*DEG,f,sinA0,cosA0);
    if(p&&p[2]>0.02){ if(pen)ctx.lineTo(p[0],p[1]); else ctx.moveTo(p[0],p[1]); pen=true; }
    else pen=false;
  }
  ctx.stroke(); ctx.restore();
  // cardinal labels
  const dirs=[['北','きた',0],['北東','',45],['東','ひがし',90],['南東','',135],
              ['南','みなみ',180],['南西','',225],['西','にし',270],['北西','',315]];
  ctx.textAlign='center';
  for(const [nm,kn,azd] of dirs){
    const label=kids?kn:nm;
    if(!label) continue;
    const p=project(-2.5*DEG,azd*DEG,f,sinA0,cosA0);
    if(!p||p[2]<0.05) continue;
    const main=azd%90===0;
    ctx.font=(main?'600 15px ':'11px ')+FONT_M;
    ctx.fillStyle=main?'rgba(240,200,110,0.9)':'rgba(154,165,196,0.75)';
    ctx.fillText(label,p[0],p[1]);
  }
}

function drawMeteors(now,starF){
  if(starF>0.4 && now>nextMeteor){
    nextMeteor=now+9000+Math.random()*22000;
    const x=Math.random()*W, y=Math.random()*H*0.4, ang=(Math.random()*40+55)*DEG*(Math.random()<0.5?1:-1);
    meteors.push({x,y,dx:Math.cos(ang),dy:Math.abs(Math.sin(ang)),t0:now,dur:650});
  }
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i], t=(now-m.t0)/m.dur;
    if(t>1){meteors.splice(i,1);continue;}
    const len=90, px=m.x+m.dx*t*220, py=m.y+m.dy*t*220;
    const gr=ctx.createLinearGradient(px,py,px-m.dx*len,py-m.dy*len);
    const a=Math.sin(t*Math.PI)*0.9*starF;
    gr.addColorStop(0,`rgba(255,250,230,${a})`); gr.addColorStop(1,'rgba(255,250,230,0)');
    ctx.strokeStyle=gr; ctx.lineWidth=1.8; ctx.beginPath();
    ctx.moveTo(px,py); ctx.lineTo(px-m.dx*len,py-m.dy*len); ctx.stroke();
  }
}
function drawFlash(now){
  if(!flash) return;
  if(now>flash.until){flash=null;return;}
  ctx.font='600 30px '+FONT_S; ctx.textAlign='center';
  ctx.fillStyle=flash.ok?'rgba(140,230,170,0.95)':'rgba(255,120,120,0.95)';
  ctx.fillText(flash.ok?'○ せいかい！':'✕ ざんねん', flash.x, flash.y);
}

/* ---------------- HUD ---------------- */
const $=id=>document.getElementById(id);
const YOBI='日月火水木金土';
function fmt(ms){
  const d=new Date(ms);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}（${YOBI[d.getDay()]}）${p(d.getHours())}:${p(d.getMinutes())}`;
}
let lastHud=0;
function updHud(simMs){
  const n=performance.now(); if(n-lastHud<250) return; lastHud=n;
  $('pTime').textContent=fmt(simMs)+(Math.abs(offsetMs)>90000?'（時間たび中）':'');
  $('pLoc').textContent=kids?(loc.kana||loc.name):loc.name;
  const azd=((az0/DEG)%360+360)%360;
  $('pDir').textContent=['北','北東','東','南東','南','南西','西','北西'][Math.round(azd/45)%8];
  $('tpNow').textContent=fmt(simMs);
}

/* ---------------- interaction ---------------- */
const ptrs=new Map(); let pinchD=0, downXY=null, downT=0, moved=false;
cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  if(ptrs.size===1){ downXY=[e.clientX,e.clientY]; downT=Date.now(); moved=false; cv.classList.add('drag'); }
  if(ptrs.size===2){ const a=[...ptrs.values()]; pinchD=Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]); }
});
cv.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId)) return;
  const prev=ptrs.get(e.pointerId); ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  if(ptrs.size===1){
    const dx=e.clientX-prev[0], dy=e.clientY-prev[1];
    if(Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1])>8) moved=true;
    const fpx=focal();
    az0-=dx/fpx/Math.max(0.35,Math.cos(alt0));
    alt0=clamp(alt0+dy/fpx, -35*DEG, 89.6*DEG);
  }else if(ptrs.size===2){
    const a=[...ptrs.values()]; const d=Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]);
    if(pinchD>0) fov=clamp(fov*pinchD/d, 24, 110);
    pinchD=d;
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId); pinchD=0; cv.classList.remove('drag');
  if(downXY && !moved && Date.now()-downT<500 && ptrs.size===0){
    handleTap(downXY[0],downXY[1]);
  }
  downXY=null;
}
cv.addEventListener('pointerup',endPtr); cv.addEventListener('pointercancel',endPtr);
cv.addEventListener('wheel',e=>{ e.preventDefault(); fov=clamp(fov*Math.exp(e.deltaY*0.0012),24,110); },{passive:false});

function nearestCon(x,y){
  let best=null,bd=1e9;
  for(const c of CONS){
    for(const i of c.idx){ const s=stars[i];
      if(!s.vis) continue;
      const d=Math.hypot(s.sx-x,s.sy-y);
      if(d<bd){bd=d;best=c;}
    }
  }
  return bd<60?best:null;
}
function handleTap(x,y){
  if(quiz){ quizTap(x,y); return; }
  // named star first
  let bs=null,bd=1e9;
  for(const s of stars){
    if(!s.vis||!s.name) continue;
    const d=Math.hypot(s.sx-x,s.sy-y);
    if(d<bd){bd=d;bs=s;}
  }
  if(bs&&bd<22){ openStar(bs); return; }
  const c=nearestCon(x,y);
  if(c){ openCon(c); } else { closeSheet(); selected=null; }
}

/* ---------------- sheet ---------------- */
const sheet=$('sheet'), sheetBody=$('sheetBody');
function openCon(c){
  selected=c;
  const up=stars[c.idx[0]].alt>0;
  const season=kids?(SEASON_KANA[c.season]||c.season):c.season;
  const chips=`<span class="chip season">${season}の${kids?'せいざ':'星座'}</span>`+
    (up?`<span class="chip up">${kids?'いま みえているよ':'いま空に見えています'}</span>`
       :`<span class="chip">${kids?'いまは ちへいせんの した':'いまは地平線の下'}</span>`);
  const named=c.ss.filter(s=>s[4]).slice(0,4).map(s=>
    `<div class="star-chip"><span class="dot" style="color:${bvColor(s[3]??0.3)};background:${bvColor(s[3]??0.3)}"></span>
     ${s[4].split('（')[0]}<small>${kids
       ?`${s[2].toFixed(1)}とうせい${s[5]?' ・ やく'+s[5]+'こうねん':''}`
       :`${s[2].toFixed(1)}等${s[5]?' ・ '+s[5]+'光年':''}`}</small></div>`).join('');
  sheetBody.innerHTML=`
    <div class="sh-kana">${kids?'せいざ':c.kana+'ざ'}</div>
    <div class="sh-name">${kids?c.kana+'ざ':c.jp}</div>
    <div class="sh-en">${c.en}</div>
    <div class="sh-chips">${chips}</div>
    <div class="sh-story${kids?' kids':''}">${kids?c.kid:c.adl}</div>
    ${kids?'':`<div class="sh-fun"><b>まめちしき</b>　${c.fun}</div>`}
    ${named?`<div class="sh-stars">${named}</div>`:''}`;
  sheet.classList.add('open');
}
function openStar(s){
  const pct=clamp((s.bv+0.4)/2.2,0.02,0.98)*100;
  const lyTxt=s.ly?(s.ly<1000?s.ly:Math.round(s.ly/100)*100):0;
  const story=kids
    ?`${s.ly?`いま みえている ひかりは、やく${lyTxt}ねんまえに この ほしを でた ひかりだよ。`:''}あおい ほしは とっても あつい ほし。あかい ほしは すこし つめたい ほしなんだ。`
    :`${s.ly?`いま見えている光は、約${lyTxt}年前にこの星を出た光です。`:''}星の色は表面温度で決まります。<b style="color:#a8c0ff">青い星ほど高温</b>、<b style="color:#ff9d68">赤い星ほど低温</b>です。`;
  sheetBody.innerHTML=`
    <div class="sh-kana">${kids?'ほし':'恒星'}</div>
    <div class="sh-name">${kids?s.name.split('（')[0]:s.name}</div>
    <div class="sh-en">${s.con?(kids?s.con.kana+'ざ':s.con.jp):(kids?(s.conName||'').replace('座','ざ'):(s.conName||''))}</div>
    <div class="sh-chips">
      <span class="chip">${s.mag.toFixed(1)}${kids?'とうせい':'等星'}</span>
      ${s.ly?`<span class="chip">${kids?'やく'+s.ly+'こうねん':'約'+s.ly+'光年'}</span>`:''}
    </div>
    <div class="sh-story${kids?' kids':''}" style="font-size:${kids?'15px':'13px'}">${story}</div>
    <div class="tempbar">
      <div class="bar"><span class="mk" style="left:${pct}%"></span></div>
      <div class="lbl">${kids
        ?'<span>あつい ほし（あおい）</span><span>つめたい ほし（あかい）</span>'
        :'<span>高温（約30,000度〜）</span><span>低温（約3,000度）</span>'}</div>
    </div>`;
  selected=s.con||null;
  sheet.classList.add('open');
}
function closeSheet(){ sheet.classList.remove('open'); }
$('sheetClose').addEventListener('click',()=>{closeSheet();selected=null;});

/* ---------------- quiz ---------------- */
const quizBar=$('quizBar');
function startQuiz(){
  const cands=CONS.filter(c=>{
    let n=0; for(const i of c.idx) if(stars[i].vis&&stars[i].alt>6*DEG) n++;
    return n>=2;
  });
  if(cands.length<3){ toast('見えている星座がすくないよ。「時間たび」で夜にしてからチャレンジ！'); return; }
  const list=cands.sort(()=>Math.random()-0.5).slice(0,Math.min(5,cands.length));
  quiz={list,i:0,score:0,lockUntil:0,reveal:null};
  closeSheet(); selected=null;
  quizBar.style.display='block'; $('bQuiz').classList.add('on');
  nextQ();
}
function nextQ(){
  const q=quiz;
  if(q.i>=q.list.length){ endQuiz(); return; }
  $('qNum').textContent=`Q${q.i+1}/${q.list.length}`;
  const c=q.list[q.i];
  $('qText').innerHTML=kids?`「<b>${c.kana}ざ</b>」を さがして タップ！`:`「<b>${c.jp}</b>」をさがしてタップ！`;
}
function quizTap(x,y){
  const q=quiz, now=performance.now();
  if(now<q.lockUntil) return;
  const hit=nearestCon(x,y), target=q.list[q.i];
  const ok=hit===target;
  if(ok)q.score++;
  flash={x,y:Math.max(50,y-30),ok,until:now+1100};
  q.reveal=target; q.lockUntil=now+1200;
  setTimeout(()=>{ if(!quiz)return; quiz.reveal=null; quiz.i++; nextQ(); },1200);
}
function endQuiz(){
  const sc=quiz.score, n=quiz.list.length;
  quiz=null; quizBar.style.display='none'; $('bQuiz').classList.remove('on');
  const msg=kids
    ?(sc===n?'ぜんぶ せいかい！きみは ほしはかせだ！':sc>=n*0.6?'すごい！あと すこしで ぜんぶ せいかい！':'また ちょうせん してみてね！')
    :(sc===n?'パーフェクト！きみは星はかせだ！':sc>=n*0.6?'すごい！あと少しでパーフェクト！':'また挑戦してね。星座線と名まえをONにして予習しよう！');
  const cnt=kids
    ?`${n}もんちゅう <b style="color:var(--gold)">${sc}もん</b> せいかい。`
    :`${n}問中 <b style="color:var(--gold)">${sc}問</b> せいかい。`;
  sheetBody.innerHTML=`
    <div class="sh-kana">クイズけっか</div>
    <div class="sh-name">${'★'.repeat(sc)}${'☆'.repeat(n-sc)}</div>
    <div class="sh-story${kids?' kids':''}">${cnt}${msg}</div>`;
  sheet.classList.add('open');
}

/* ---------------- controls ---------------- */
function toggle(btn,fn){ $(btn).addEventListener('click',e=>{ fn(e.currentTarget); }); }
toggle('bLines',b=>{ showLines=!showLines; b.classList.toggle('on',showLines); });
toggle('bNames',b=>{ showNames=!showNames; b.classList.toggle('on',showNames); });
toggle('bAst',b=>{ showAster=!showAster; b.classList.toggle('on',showAster);
  if(showAster) toast('夏・冬の大三角と春の大曲線。一等星をつなぐ星さがしの道しるべです'); });
function updateDock(){
  $('bLines').textContent=kids?'せいざの せん':'星座線';
  $('bNames').textContent=kids?'なまえ':'名まえ';
  $('bAst').textContent=kids?'さんかく':'大三角';
  $('bTime').textContent=kids?'じかんたび':'時間たび';
  $('bLoc').textContent=(kids?'ばしょ: ':'場所: ')+(kids?(loc.kana||loc.name):loc.name);
}
toggle('bKids',b=>{ kids=!kids; b.classList.toggle('on',kids);
  updateDock();
  if(selected) openCon(selected);
  toast(kids?'ひらがなモード：かんじを つかわない おはなしに きりかえたよ':'おとなモード：くわしい解説に切りかえました'); });
toggle('bTime',b=>{ const p=$('timePanel'); p.classList.toggle('open'); b.classList.toggle('on'); });
toggle('bQuiz',()=>{ if(quiz){quiz=null;quizBar.style.display='none';$('bQuiz').classList.remove('on');} else startQuiz(); });
toggle('bLoc',b=>{
  locIdx=(locIdx+1)%LOCS.length; loc=LOCS[locIdx];
  updateDock();
  az0=(loc.lat>=0?180:0)*DEG; alt0=32*DEG;
  toast(loc.lat<0?'シドニー（南半球）！北を向くと太陽、南の空に南十字星。星の動きも逆まわりだよ':`${loc.name}の空に移動しました`);
});

const slider=$('tpSlider');
slider.addEventListener('input',()=>{ offsetMs=scrubBase+Number(slider.value)*60000; });
slider.addEventListener('change',()=>{ scrubBase=offsetMs; slider.value=0; });
document.querySelectorAll('.tbtn[data-d]').forEach(b=>{
  b.addEventListener('click',()=>{ offsetMs+=Number(b.dataset.d)*86400000; scrubBase=offsetMs; slider.value=0; });
});
$('tpNowBtn').addEventListener('click',()=>{ offsetMs=0; scrubBase=0; slider.value=0; playing=false; $('tpPlay').textContent='▶ 早送り'; });
$('tpPlay').addEventListener('click',()=>{
  playing=!playing; $('tpPlay').textContent=playing?'⏸ とめる':'▶ 早送り';
  if(playing) toast('時間を600倍速で早送り中。星がまわる「日周運動」を見てみよう');
});
setInterval(()=>{ if(playing){ offsetMs+=600*250; scrubBase=offsetMs; } },250);

/* toast */
let toastTimer=0;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),4200);
}

/* help */
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
$('helpBtn').addEventListener('click',()=>$('help').classList.add('open'));
$('helpStart').addEventListener('click',()=>{ $('help').classList.remove('open'); lsSet('hzs_seen','1'); });
if(!lsGet('hzs_seen')) $('help').classList.add('open');

/* if daytime now, jump to tonight 21:00 */
(function(){
  const now=Date.now();
  const s=sunRaDec(now);
  const lst=((gmstHours(now)+loc.lon/15)%24)*15*DEG;
  const [a]=altAz(Math.sin(s.dec),Math.cos(s.dec),s.ra,lst,Math.sin(loc.lat*DEG),Math.cos(loc.lat*DEG));
  if(a/DEG>-5){
    const d=new Date(); d.setHours(21,0,0,0);
    if(d.getTime()<now) d.setDate(d.getDate()+1);
    offsetMs=d.getTime()-now; scrubBase=offsetMs;
    setTimeout(()=>toast('いまは昼間なので、今夜21時の空にワープしました🌙（「時間たび」→「いまに戻る」で現在へ）'),600);
  }
})();

requestAnimationFrame(render);
</script>
